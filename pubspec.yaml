name: everyday_gem
description: "Everyday Gem - Build better habits, one gem at a time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Charts
  fl_chart: ^0.70.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI
  smooth_page_indicator: ^1.2.0+3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
